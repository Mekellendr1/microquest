version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: microquest
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: .
    ports:
      - "8090:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/microquest
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: change-this-in-production-use-long-random-string
      FIREBASE_SERVICE_ACCOUNT: /app/service-account.json
    volumes:
      - ./service-account.json:/app/service-account.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
