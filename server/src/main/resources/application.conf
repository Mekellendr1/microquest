ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.example.microquest.ApplicationKt.module ]
    }
}

jwt {
    secret = "change-this-secret-in-production-min-32-chars!!"
    secret = ${?JWT_SECRET}
    issuer = "microquest"
    audience = "microquest-users"
    realm = "MicroQuest"
}

database {
    url = "jdbc:postgresql://localhost:5432/microquest"
    url = ${?DATABASE_URL}
    user = "postgres"
    user = ${?DB_USER}
    password = "postgres"
    password = ${?DB_PASSWORD}
}
